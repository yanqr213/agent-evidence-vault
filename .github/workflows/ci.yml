name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Build sample vault
        run: python -m agent_evidence_vault collect --root examples/basic --evidence examples/basic/evidence --out vault --format all --minimum-score 60
      - name: Validate sample attestation
        run: python -m json.tool vault/attestation.json > /dev/null
      - name: Verify sample vault integrity
        run: python -m agent_evidence_vault check --manifest vault/manifest.json --root examples/basic

